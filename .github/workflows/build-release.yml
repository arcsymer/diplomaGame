name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Windows x64 build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (с LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-build-${{ hashFiles('Packages/manifest.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-build-
            Library-

      - name: Build (GameCI)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64
          buildName: diplomaGame
          # Образа для 6000.4.9f1 нет — пин на ближайший старший патч (см. ADR-008)
          customImage: unityci/editor:ubuntu-6000.4.10f1-windows-mono-3

      - name: Zip build
        run: |
          cd build/StandaloneWindows64
          sudo zip -r ../../diplomaGame-Windows-x64.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: diplomaGame-Windows-x64
          path: diplomaGame-Windows-x64.zip

      - name: Attach to Release (только для тегов)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "diplomaGame-Windows-x64.zip#Windows Build (x64)" \
            --title "diplomaGame ${GITHUB_REF_NAME}" \
            --generate-notes || \
          gh release upload "${GITHUB_REF_NAME}" "diplomaGame-Windows-x64.zip#Windows Build (x64)"
